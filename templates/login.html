<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — eBay Scraper</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    body { background:#1a1f36; min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .login-card { width:100%; max-width:380px; border:none; border-radius:.75rem; box-shadow:0 8px 30px rgba(0,0,0,.3); }
    .brand { font-weight:700; font-size:1.25rem; color:#1a1f36; }
    .flash-error { background:#fee2e2; border-color:#fca5a5; color:#991b1b; }
  </style>
</head>
<body>
  <div class="card login-card">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <div class="brand"><i class="bi bi-box-seam-fill text-warning me-1"></i> eBay Scraper</div>
        <div class="text-muted small mt-1">Sign in to continue</div>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="alert border flash-{{ category }} py-2 small mb-3">{{ message }}</div>
        {% endfor %}
      {% endwith %}

      <form method="post">
        <div class="mb-3">
          <label class="form-label fw-semibold small">Email</label>
          <input name="email" type="email" class="form-control" value="{{ email or '' }}" required autofocus />
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold small">Password</label>
          <input name="password" type="password" class="form-control" required />
        </div>
        <button type="submit" class="btn btn-primary w-100">
          <i class="bi bi-box-arrow-in-right me-1"></i> Sign in
        </button>
      </form>
    </div>
  </div>
</body>
</html>
